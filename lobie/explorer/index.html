<style>

  .nft-card:hover{border-color:#7c3aed;box-shadow:0 4px 20px rgba(124,58,237,0.08)}
  .nft-card .name{font-weight:700;font-size:14px;margin-bottom:2px}
  .nft-card .building-tag{color:#7c3aed;font-size:10px;font-weight:600;margin-bottom:12px}
  .nft-card .metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
  .nft-card .metric:last-child{border-bottom:none}

  .nft-card .metric .val{font-family:'Space Mono',monospace;font-weight:700}

  .nft-card .metric .val.purple{color:#7c3aed}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}

  .modal .close{float:right;background:none;border:none;color:#a3a3a3;font-size:20px;cursor:pointer}
  .modal .close:hover{color:#0a0a0a}

  .modal .sub{font-size:11px;color:#737373;font-family:'Space Mono',monospace;margin-bottom:16px}
  .modal .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .modal .kpi{background:#f9f9fb;border:1px solid #e5e5e5;border-radius:10px;padding:14px;text-align:center}
  .modal .kpi .val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
  .modal .kpi .val.purple{color:#7c3aed}

  .modal .obs-table{width:100%;border-collapse:collapse;margin-top:12px}
  .modal .obs-table th{font-size:9px;color:#a3a3a3;text-transform:uppercase;text-align:left;padding:6px 8px;border-bottom:1px solid #e5e5e5;font-family:'Space Mono',monospace}
  .modal .obs-table td{padding:6px 8px;border-bottom:1px solid #f5f5f5;font-size:11px;font-family:'Space Mono',monospace}
  .progress{text-align:center;padding:40px;color:#a3a3a3;font-family:'Space Mono',monospace;font-size:13px}
  .progress .bar{width:300px;height:4px;background:#e5e5e5;border-radius:2px;margin:12px auto;overflow:hidden}
  .progress .bar .fill{height:100%;background:#7c3aed;border-radius:2px;transition:width .3s}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid #e5e5e5;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:768px){.tbl{font-size:10px}.tbl td,.tbl th{padding:8px 6px}.grid{grid-template-columns:1fr}.modal .kpis{grid-template-columns:1fr}}
</style>

<main>
  <div class="top">
    <h1 data-i18n="title">Lobie Units On-Chain</h1>
    <div class="stats">
      <div class="stat"><div class="num" id="sUnits">—</div><div class="lbl" data-i18n="stat_units">Units</div></div>
      <div class="stat"><div class="num" id="sObs">—</div><div class="lbl" data-i18n="stat_obs">Observations</div></div>
      <div class="stat"><div class="num" id="sPortNPV">—</div><div class="lbl" data-i18n="stat_npv">Portfolio NPV</div></div>
    </div>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search unit or building..." data-i18n-placeholder="search_ph">
    <select id="buildingFilter"><option value="" data-i18n="all_buildings">All Buildings</option></select>
    <div class="view-toggle">
      <button class="view-btn on" onclick="setView('table',this)" data-i18n="view_table">Table</button>
      <button class="view-btn" onclick="setView('grid',this)" data-i18n="view_cards">Cards</button>
    </div>
  </div>

  <div id="content">
    <div class="progress"><div class="spin"></div><br><span data-i18n="loading">Loading from Base mainnet...</span><div class="bar"><div class="fill" id="loadBar" style="width:0%"></div></div><div id="loadStatus" data-i18n="scan_events">Scanning events...</div></div>
  </div>
</main>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
<script>
const RPC = 'https://base-mainnet.g.alchemy.com/v2/5QrXWREEtmi4gITNoJsJf';
const REGISTRY = '0xd8C32a417B5317D34f783CE4e959850465AD4638';
const DEPLOY_BLOCK = 44687648; // 2026-04-04 deployment of LobieUnitRegistry on Base
const LOG_CHUNK = 9500;        // Alchemy free tier hard-caps eth_getLogs at 10,000 blocks
const ABI = [
  'function totalUnits() view returns (uint256)',
  'function unitDisplayName(uint256) view returns (string)',
  'function units(uint256) view returns (uint64 buildingId, bytes32 unitCodeHash, bytes32 metadataURI, uint32 observationCount, int128 ttmAveragePayout, uint64 lastObservedYearMonth, uint64 lastUpdateTimestamp, bytes32 historyMerkleRoot)',
  'function observationsOf(uint256) view returns (tuple(uint16 year, uint8 month, int128 grossRevenue, int128 otaFees, int128 taxes, int128 cleaning, int128 lobieFee, int128 condominio, int128 energia, int128 iptu, int128 manutencao, int128 enxoval, int128 otherExpenses, int128 netResult, int128 ownerPayout, bytes32 sourceRowHash, bytes32 attestationId)[12])',
  'function defaultR() view returns (uint256)',
  'function defaultG() view returns (uint256)',
  'event UnitMinted(uint256 indexed tokenId, uint64 indexed buildingId, bytes32 unitCodeHash)',
];

let allUnits = [];
let currentView = 'table';
let defaultR = 0.06, defaultG = 0.03;
const provider = new ethers.JsonRpcProvider(RPC);
const registry = new ethers.Contract(REGISTRY, ABI, provider);

function gordonNPV(ttmAvg, r, g) {
  if (ttmAvg <= 0 || r <= g) return 0;
  const annual = ttmAvg * 12;
  const d1 = annual * (1 + g);
  return d1 / (r - g);
}

async function loadUnits() {
  // Get default rates
  try {
    const [r, g] = await Promise.all([registry.defaultR(), registry.defaultG()]);
    defaultR = Number(ethers.formatEther(r));
    defaultG = Number(ethers.formatEther(g));
  } catch {}

  // Scan UnitMinted events from deployment block to head, in <=10k chunks (Alchemy hard limit).
  // tokenIds are keccak256(buildingId, unitCode) >> 96 — non-sequential, so we MUST learn them
  // from logs (the contract is not ERC721Enumerable).
  const head = await provider.getBlockNumber();
  const totalBlocks = head - DEPLOY_BLOCK;
  const totalChunks = Math.ceil(totalBlocks / LOG_CHUNK);
  document.getElementById('loadStatus').textContent = `Scanning events from block ${DEPLOY_BLOCK} (${totalChunks} chunks)...`;

  let events = [];
  let chunksDone = 0;
  for (let from = DEPLOY_BLOCK; from <= head; from += LOG_CHUNK) {
    const to = Math.min(from + LOG_CHUNK - 1, head);
    try {
      const chunk = await registry.queryFilter(registry.filters.UnitMinted(), from, to);
      events = events.concat(chunk);
    } catch (err) {
      // Surface the failure instead of hanging silently
      throw new Error(`eth_getLogs failed at blocks [${from}, ${to}]: ${err.message || err}`);
    }
    chunksDone++;
    const pct = Math.floor((chunksDone / totalChunks) * 20); // first 20% of bar = scan phase
    document.getElementById('loadBar').style.width = pct + '%';
    document.getElementById('loadStatus').textContent =
      `Scanning events... ${chunksDone}/${totalChunks} chunks · ${events.length} units found`;
  }

  document.getElementById('loadStatus').textContent = `Found ${events.length} units. Loading data...`;
  document.getElementById('loadBar').style.width = '20%';

  // Batch load unit data (10 at a time for speed)
  const buildings = new Set();
  const BATCH = 10;

  for (let i = 0; i < events.length; i += BATCH) {
    const batch = events.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async (e) => {
      const tokenId = e.args[0];
      try {
        const [unit, name] = await Promise.all([
          registry.units(tokenId),
          registry.unitDisplayName(tokenId),
        ]);
        return { tokenId, unit, name };
      } catch { return null; }
    }));

    for (const r of results) {
      if (!r) continue;
      const { tokenId, unit, name } = r;
      const obsCount = Number(unit.observationCount);
      const ttm = Number(ethers.formatEther(unit.ttmAveragePayout));
      const lastYM = Number(unit.lastObservedYearMonth);
      const parts = name.split('::');
      const building = parts[0] || 'Unknown';
      const unitCode = parts[1] || name;
      buildings.add(building);

      const npv = obsCount >= 12 ? gordonNPV(ttm, defaultR, defaultG) : 0;

      allUnits.push({
        tokenId: tokenId.toString(), name, building, unitCode,
        buildingId: Number(unit.buildingId), obsCount, ttmAvg: ttm,
        lastPeriod: lastYM > 0 ? `${Math.floor(lastYM/12)}-${String(lastYM%12).padStart(2,'0')}` : '—',
        npv,
      });
    }

    // Progressive update
    const pct = 20 + Math.floor((i / events.length) * 80);
    const bar = document.getElementById('loadBar');
    const status = document.getElementById('loadStatus');
    if (bar) bar.style.width = pct + '%';
    if (status) status.textContent = `Loaded ${allUnits.length} of ${events.length} units...`;

    // Render progressively every 50 units
    if (allUnits.length % 50 === 0 || i + BATCH >= events.length) {
      updateStats(buildings);
      render();
    }
  }

  allUnits.sort((a, b) => b.npv - a.npv); // Sort by NPV descending
  updateStats(buildings);
  populateBuildingFilter(buildings);
  render();
  const bar = document.getElementById('loadBar');
  const status = document.getElementById('loadStatus');
  if (bar) bar.style.width = '100%';
  if (status) status.textContent = '';
}

function updateStats(buildings) {
  document.getElementById('sUnits').textContent = allUnits.length;
  document.getElementById('sObs').textContent = allUnits.reduce((s, u) => s + u.obsCount, 0).toLocaleString();
  const totalNPV = allUnits.reduce((s, u) => s + u.npv, 0);
  document.getElementById('sPortNPV').textContent = totalNPV > 0 ? 'R$ ' + (totalNPV / 1e6).toFixed(1) + 'M' : '—';
}

function populateBuildingFilter(buildings) {
  const sel = document.getElementById('buildingFilter');
  sel.innerHTML = '<option value="">All Buildings</option>';
  [...buildings].sort().forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const bf = document.getElementById('buildingFilter').value;
  const filtered = allUnits.filter(u => {
    if (q && !u.name.toLowerCase().includes(q)) return false;
    if (bf && u.building !== bf) return false;
    return true;
  });
  if (currentView === 'table') renderTable(filtered);
  else renderGrid(filtered);
}

function renderTable(units) {
  const el = document.getElementById('content');
  if (!units.length) { el.innerHTML = '<div class="progress">No units found</div>'; return; }

  let html = `<table class="tbl"><thead><tr>
    <th>Unit</th><th>Building</th><th>Obs</th>
    <th>TTM Avg Payout</th><th>Gordon NPV (r=${(defaultR*100).toFixed(0)}% g=${(defaultG*100).toFixed(0)}%)</th><th>Last Period</th>
  </tr></thead><tbody>`;

  for (const u of units) {
    const payClass = u.ttmAvg < 0 ? 'payout neg' : 'payout';
    const npvStr = u.npv > 0 ? 'R$ ' + u.npv.toLocaleString('pt-BR', {maximumFractionDigits: 0}) : '—';
    html += `<tr onclick="showDetail('${u.tokenId}')" style="cursor:pointer">
      <td class="unit-name">${u.unitCode}</td>
      <td class="building">${u.building}</td>
      <td class="obs-count">${u.obsCount}</td>
      <td class="${payClass}">R$ ${u.ttmAvg.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
      <td class="npv">${npvStr}</td>
      <td>${u.lastPeriod}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderGrid(units) {
  const el = document.getElementById('content');
  if (!units.length) { el.innerHTML = '<div class="progress">No units found</div>'; return; }

  let html = '<div class="grid">';
  for (const u of units) {
    const npvStr = u.npv > 0 ? 'R$ ' + (u.npv / 1000).toFixed(0) + 'k' : '—';
    const payStr = 'R$ ' + u.ttmAvg.toLocaleString('pt-BR', {minimumFractionDigits: 0});
    html += `<div class="nft-card" onclick="showDetail('${u.tokenId}')">
      <div class="name">${u.unitCode}</div>
      <div class="building-tag">${u.building}</div>
      <div class="metric"><span class="lbl">Observations</span><span class="val">${u.obsCount}</span></div>
      <div class="metric"><span class="lbl">TTM Avg Payout</span><span class="val green">${payStr}</span></div>
      <div class="metric"><span class="lbl">Gordon NPV</span><span class="val purple">${npvStr}</span></div>
      <div class="metric"><span class="lbl">Last Period</span><span class="val">${u.lastPeriod}</span></div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

async function showDetail(tokenId) {
  document.getElementById('modal').classList.add('on');
  const content = document.getElementById('modalContent');
  const unit = allUnits.find(u => u.tokenId === tokenId);
  if (!unit) return;

  const npvStr = unit.npv > 0 ? 'R$ ' + unit.npv.toLocaleString('pt-BR', {maximumFractionDigits: 0}) : '—';

  content.innerHTML = `<h2>${unit.name}</h2>
    <div class="sub">Building #${unit.buildingId} · ${unit.obsCount} observations
      · <a href="https://basescan.org/token/0xd8C32a417B5317D34f783CE4e959850465AD4638?a=${tokenId}" target="_blank" style="color:#7c3aed">Basescan</a></div>
    <div class="kpis">
      <div class="kpi"><div class="val green">R$ ${unit.ttmAvg.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="lbl">TTM Avg Payout/mo</div></div>
      <div class="kpi"><div class="val purple">${npvStr}</div><div class="lbl">Gordon NPV (r=${(defaultR*100)}% g=${(defaultG*100)}%)</div></div>
      <div class="kpi"><div class="val">${unit.obsCount}</div><div class="lbl">Observations</div></div>
    </div>
    <div style="color:#a3a3a3;font-size:11px;font-family:'Space Mono',monospace">Loading observations...</div>`;

  try {
    const obs = await registry.observationsOf(BigInt(tokenId));
    let obsHtml = `<table class="obs-table"><thead><tr>
      <th>Period</th><th>Gross Rev</th><th>OTA Fee</th><th>Cleaning</th><th>Lobie Fee</th>
      <th>Condo</th><th>Net Result</th><th>Owner Payout</th><th>Attested</th>
    </tr></thead><tbody>`;

    for (const o of obs) {
      if (Number(o.year) === 0) continue;
      const fmt = v => { const n = Number(ethers.formatEther(v)); return n === 0 ? '—' : n.toLocaleString('pt-BR',{maximumFractionDigits:0}); };
      const attested = o.attestationId !== ethers.ZeroHash ? '✓' : '—';
      obsHtml += `<tr>
        <td>${o.year}-${String(o.month).padStart(2,'0')}</td>
        <td>${fmt(o.grossRevenue)}</td><td>${fmt(o.otaFees)}</td><td>${fmt(o.cleaning)}</td>
        <td>${fmt(o.lobieFee)}</td><td>${fmt(o.condominio)}</td><td>${fmt(o.netResult)}</td>
        <td style="color:#16a34a;font-weight:700">${fmt(o.ownerPayout)}</td><td>${attested}</td>
      </tr>`;
    }
    obsHtml += '</tbody></table>';

    content.innerHTML = `<h2>${unit.name}</h2>
      <div class="sub">Building #${unit.buildingId} · ${unit.obsCount} observations
        · <a href="https://basescan.org/token/0xd8C32a417B5317D34f783CE4e959850465AD4638?a=${tokenId}" target="_blank" style="color:#7c3aed">Basescan</a></div>
      <div class="kpis">
        <div class="kpi"><div class="val green">R$ ${unit.ttmAvg.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="lbl">TTM Avg Payout/mo</div></div>
        <div class="kpi"><div class="val purple">${npvStr}</div><div class="lbl">Gordon NPV (r=${(defaultR*100)}% g=${(defaultG*100)}%)</div></div>
        <div class="kpi"><div class="val">${unit.obsCount}</div><div class="lbl">Observations</div></div>
      </div>
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">Trailing 12 Observations</div>
      ${obsHtml}`;
  } catch (err) {
    content.innerHTML += `<div style="color:#ef4444;font-size:11px">Error: ${err.message}</div>`;
  }
}

function closeModal() { document.getElementById('modal').classList.remove('on'); }
function setView(v, btn) { currentView = v; document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('on')); btn.classList.add('on'); render(); }

document.getElementById('search').addEventListener('input', render);
document.getElementById('buildingFilter').addEventListener('change', render);

loadUnits().catch(e => {
  document.getElementById('content').innerHTML = `<div class="progress" style="color:#ef4444">Error: ${e.message}</div>`;
});
</script>
