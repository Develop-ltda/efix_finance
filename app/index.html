<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFIX — abrindo sua carteira…</title>
  <!-- 2026-07-10: /app/ (antigo "Efix DeFi" MetaMask+leverage) foi superado pelo
       app/wallet/ (smart wallet Account Kit, cobre leverage/efixDI+). Redirect aqui
       fecha o fluxo de depósito legado (/api/pix/qrcode, sem binding de entrega —
       incidente danisantos) e aponta a porta da frente para o wallet.
       Fonte original preservada em app/index.legacy.html. -->
  <link rel="canonical" href="/app/wallet/">
  <meta http-equiv="refresh" content="0; url=/app/wallet/">
  <script>
    // Preserva query + hash na travessia (ex.: ?ref=..., #deposit).
    (function () {
      try {
        var dest = "/app/wallet/" + (window.location.search || "") + (window.location.hash || "");
        window.location.replace(dest);
      } catch (e) {
        window.location.href = "/app/wallet/";
      }
    })();
  </script>
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;background:#0b0e14;color:#e6edf3;
      font-family:'Space Mono',ui-monospace,monospace;text-align:center;padding:24px}
    a{color:#58a6ff}
  </style>
</head>
<body>
  <div>
    <p>Redirecionando para a sua carteira EFIX…</p>
    <p>Se não for automático, <a href="/app/wallet/">clique aqui</a>.</p>
  </div>
</body>
</html>
